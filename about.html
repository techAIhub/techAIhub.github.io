<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — TechAI Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .about-wrap { max-width:900px; margin:0 auto; padding:60px 5%; }
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:52px; align-items:start; }
    .about-name { font-family:'Space Grotesk',sans-serif; font-size:clamp(1.6rem,4vw,2.4rem); font-weight:700; letter-spacing:-0.5px; margin-bottom:14px; line-height:1.2; }
    .about-bio { color:var(--muted); font-size:0.95rem; line-height:1.8; margin-bottom:14px; }
    .skills-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-top:20px; }
    .skill-tag { background:var(--accent-light); color:var(--accent); font-size:0.8rem; font-weight:500; padding:5px 13px; border-radius:6px; }
    .timeline-card { background:white; border:1px solid var(--border); border-radius:12px; padding:28px; }
    .timeline-card h3 { font-family:'Space Grotesk',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:18px; }
    .tl-item { display:flex; gap:12px; margin-bottom:16px; }
    .tl-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); margin-top:6px; flex-shrink:0; }
    .tl-title { font-size:0.9rem; font-weight:600; }
    .tl-sub { font-size:0.8rem; color:var(--muted); }
    @media(max-width:768px){ .about-grid{ grid-template-columns:1fr; gap:28px; } }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">TechAI<span>Hub</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="about.html" class="active">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="about-wrap">
  <div class="sec-label">About Me</div>
  <div class="about-grid">
    <div>
      <h1 class="about-name" id="aName"></h1>
      <div id="aBio1" class="about-bio"></div>
      <div id="aBio2" class="about-bio"></div>
      <div class="skills-wrap" id="aSkills"></div>
    </div>
    <div class="timeline-card">
      <h3>My Journey</h3>
      <div id="aTimeline"></div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>© 2025 TechAI Hub. Built with ❤️</p>
  <p><a href="blog.html">Blog</a> · <a href="about.html">About</a> · <a href="contact.html">Contact</a></p>
</footer>

<script src="_nav.js"></script>
<script>
  function renderAbout() {
    const a = getAbout();
    document.getElementById('aName').textContent    = a.tagline;
    document.getElementById('aBio1').textContent    = a.bio1;
    document.getElementById('aBio2').textContent    = a.bio2;
    document.getElementById('aSkills').innerHTML    = a.skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
    document.getElementById('aTimeline').innerHTML  = a.timeline.map(t => `
      <div class="tl-item">
        <div class="tl-dot"></div>
        <div><div class="tl-title">${t.title}</div><div class="tl-sub">${t.sub}</div></div>
      </div>`).join('');
  }
  renderAbout();
</script>
</body>
</html>
