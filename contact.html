<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — TechAI Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-wrap { max-width:580px; margin:0 auto; padding:60px 5%; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:7px; }
    .form-group input, .form-group textarea { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font-size:0.875rem; font-family:'Inter',sans-serif; background:white; outline:none; transition:border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color:var(--accent); }
    .form-group textarea { resize:vertical; min-height:120px; }
    .submit-btn { width:100%; background:var(--accent); color:white; border:none; padding:13px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
    .submit-btn:hover { background:#1d4ed8; }
    .success-box { background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; padding:16px; border-radius:8px; text-align:center; font-weight:500; display:none; margin-top:12px; }
    .social-row { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:32px; }
    .soc-btn { display:flex; align-items:center; gap:7px; color:var(--muted); text-decoration:none; font-size:0.85rem; font-weight:500; padding:8px 16px; border:1px solid var(--border); border-radius:7px; transition:all 0.2s; }
    .soc-btn:hover { border-color:var(--accent); color:var(--accent); }
    @media(max-width:600px){ .form-row{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">TechAI<span>Hub</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="blog.html">Blog</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<div class="contact-wrap">
  <div class="sec-label">Get in Touch</div>
  <div class="sec-title">Contact Me</div>
  <p class="sec-sub" style="margin-bottom:32px">Have a question, collab idea, or want to say hi?</p>

  <div class="form-row">
    <div class="form-group">
      <label>Name *</label>
      <input type="text" id="cName" placeholder="Your name">
    </div>
    <div class="form-group">
      <label>Email *</label>
      <input type="email" id="cEmail" placeholder="your@email.com">
    </div>
  </div>
  <div class="form-group">
    <label>Subject</label>
    <input type="text" id="cSubject" placeholder="Collab / Question / Feedback">
  </div>
  <div class="form-group">
    <label>Message *</label>
    <textarea id="cMessage" placeholder="Write your message..."></textarea>
  </div>
  <button class="submit-btn" onclick="sendMsg()">Send Message →</button>
  <div class="success-box" id="successBox">✅ Message sent! I'll reply soon.</div>

  <div class="social-row">
    <a href="https://instagram.com" target="_blank" class="soc-btn">📸 Instagram</a>
    <a href="https://twitter.com"   target="_blank" class="soc-btn">🐦 Twitter/X</a>
    <a href="https://linkedin.com"  target="_blank" class="soc-btn">💼 LinkedIn</a>
    <a href="https://github.com/techAIhub" target="_blank" class="soc-btn">🐙 GitHub</a>
  </div>
</div>

<footer class="footer">
  <p>© 2025 TechAI Hub. Built with ❤️</p>
  <p><a href="blog.html">Blog</a> · <a href="about.html">About</a> · <a href="contact.html">Contact</a></p>
</footer>

<script src="_nav.js"></script>
<script>
  function sendMsg() {
    const name    = document.getElementById('cName').value.trim();
    const email   = document.getElementById('cEmail').value.trim();
    const subject = document.getElementById('cSubject').value.trim();
    const message = document.getElementById('cMessage').value.trim();
    if (!name || !email || !message) { alert('Please fill in Name, Email and Message.'); return; }
    const msgs = getMsgs();
    msgs.push({ id: Date.now(), name, email, subject, message, read: false,
      time: new Date().toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) });
    saveMsgs(msgs);
    document.getElementById('cName').value = document.getElementById('cEmail').value =
    document.getElementById('cSubject').value = document.getElementById('cMessage').value = '';
    const box = document.getElementById('successBox');
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }
</script>
</body>
</html>
